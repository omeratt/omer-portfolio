name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # docs-only changes don't affect the built site — skip the deploy
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow one concurrent deployment, cancel in-progress runs
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      # first attempt that succeeds wins the URL
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      # actions/deploy-pages spuriously returns "deployment_failed" on fresh
      # Pages sites; re-running the same artifact is idempotent, so retry up
      # to 3 times with a short settle delay before failing the job.
      - id: deploy1
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deploy1.outcome == 'failure'
        run: sleep 20
      - id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30
      - id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
